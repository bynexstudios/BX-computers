<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Bynex PC Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="antialiased relative min-h-screen flex flex-col">
    <div class="cyber-grid fixed"></div>

    <nav class="glass-nav fixed w-full z-50 transition-all duration-300">
        <!-- Same nav as about -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <a href="index.html" class="font-heading font-black text-2xl tracking-tight text-white">BYNEX<span class="text-sky-400">PC</span></a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="index.html" class="text-slate-300 hover:text-white hover:bg-slate-800 font-medium px-3 py-2 rounded-md transition">Home</a>
                        <a href="shop.html" class="text-slate-300 hover:text-white hover:bg-slate-800 font-medium px-3 py-2 rounded-md transition">Shop</a>
                        <a href="about.html" class="text-slate-300 hover:text-white hover:bg-slate-800 font-medium px-3 py-2 rounded-md transition">About</a>
                        <a href="contact.html" class="text-sky-400 font-medium px-3 py-2 rounded-md transition hover:bg-slate-800">Contact</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-16 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full z-10 relative">
        <h1 class="text-4xl md:text-5xl font-heading font-black mb-12 text-center">Get in <span class="text-sky-400">Touch</span></h1>

        <div class="grid md:grid-cols-2 gap-12">
            <!-- Contact Form -->
            <div class="glass p-8 rounded-3xl">
                <h2 class="text-2xl font-bold mb-6">Send us a message</h2>
                <form onsubmit="event.preventDefault(); alert('Message sent!');" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Name</label>
                        <input type="text" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-sky-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Email</label>
                        <input type="email" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-sky-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Message</label>
                        <textarea required rows="4" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-sky-500 transition"></textarea>
                    </div>
                    <button type="submit" class="w-full btn-primary py-3.5 rounded-xl font-bold">Send Message</button>
                </form>
            </div>

            <!-- Info & Map -->
            <div class="space-y-8">
                <div class="glass p-8 rounded-3xl">
                    <h3 class="text-xl font-bold mb-4">Contact Information</h3>
                    <ul class="space-y-4 text-slate-300">
                        <li class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-sky-500/20 flex items-center justify-center text-sky-400"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg></div>
                            Level 2, Unity Plaza, Colombo 04
                        </li>
                        <li class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-violet-500/20 flex items-center justify-center text-violet-400"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg></div>
                            +94 11 234 5678
                        </li>
                        <li class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-sky-500/20 flex items-center justify-center text-sky-400"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg></div>
                            bynexstudios@gmail.com
                        </li>
                    </ul>
                </div>

                <!-- Map Placeholder -->
                <div class="h-48 rounded-3xl overflow-hidden bg-slate-800 border border-slate-700 flex items-center justify-center relative group">
                    <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?q=80&w=800&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-50 grayscale group-hover:grayscale-0 transition duration-500" alt="Map Location">
                    <div class="relative z-10 glass px-6 py-2 rounded-full font-bold shadow-xl">View on Map</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-800 bg-slate-950/80 py-8 text-center text-sm text-slate-500 relative z-10">
        <div class="max-w-7xl mx-auto px-4">&copy; 2026 Bynex PC. All rights reserved.</div>
    </footer>
</body>
</html>
