<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Admin | Bynex PC Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="antialiased bg-slate-950 text-white min-h-screen flex">
    
    <!-- Sidebar Snippet -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-screen sticky top-0">
        <div class="h-20 flex items-center px-6 border-b border-slate-800">
            <a href="../index.html" class="font-heading font-black text-2xl tracking-tight text-white">BYNEX<span class="text-sky-400">PC</span></a>
        </div>
        <nav class="flex-grow py-6 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Dashboard</a>
            <a href="products.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Products</a>
            <a href="orders.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Orders</a>
            <a href="users.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Customers</a>
            <a href="settings.html" class="flex items-center gap-3 px-4 py-3 bg-sky-500/10 text-sky-400 rounded-xl font-medium transition">Settings</a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="handleLogout()" class="flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-xl font-medium transition w-full">Sign Out</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-heading font-black">Store Settings</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                <h2 class="text-xl font-bold mb-6">General Information</h2>
                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Store Name</label>
                        <input type="text" value="Bynex PC Hub" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-sky-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Contact Email</label>
                        <input type="email" value="bynexstudios@gmail.com" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-sky-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Currency</label>
                        <select class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-sky-500 focus:outline-none">
                            <option>LKR (Sri Lankan Rupee)</option>
                            <option>USD (US Dollar)</option>
                        </select>
                    </div>
                    <button type="button" class="bg-sky-500 hover:bg-sky-400 text-white px-6 py-2 rounded-lg font-bold transition mt-4">Save Changes</button>
                </form>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                <h2 class="text-xl font-bold mb-6">Admin Account</h2>
                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Admin Email</label>
                        <input type="email" value="bynexstudios@gmail.com" disabled class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-500 cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">New Password</label>
                        <input type="password" placeholder="Enter new password" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-sky-500 focus:outline-none">
                    </div>
                    <button type="button" class="bg-sky-500 hover:bg-sky-400 text-white px-6 py-2 rounded-lg font-bold transition mt-4">Update Password</button>
                </form>
            </div>
        </div>
    </main>

    <script src="../assets/js/auth.js"></script>
    <script>document.addEventListener('DOMContentLoaded', checkAdminAuth);</script>
</body>
</html>
