<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Admin | Bynex PC Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="antialiased bg-slate-950 text-white min-h-screen flex">
    
    <!-- Sidebar Snippet -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-screen sticky top-0">
        <div class="h-20 flex items-center px-6 border-b border-slate-800">
            <a href="../index.html" class="font-heading font-black text-2xl tracking-tight text-white">BYNEX<span class="text-sky-400">PC</span></a>
        </div>
        <nav class="flex-grow py-6 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Dashboard</a>
            <a href="products.html" class="flex items-center gap-3 px-4 py-3 bg-sky-500/10 text-sky-400 rounded-xl font-medium transition">Products</a>
            <a href="orders.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Orders</a>
            <a href="users.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Customers</a>
            <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Settings</a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="handleLogout()" class="flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-xl font-medium transition w-full">Sign Out</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-heading font-black">Manage Products</h1>
            <button class="bg-sky-500 hover:bg-sky-400 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 transition">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                Add New Product
            </button>
        </header>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/30">
                <input type="text" placeholder="Search products..." class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm text-white focus:border-sky-500 focus:outline-none w-64">
            </div>
            <table class="w-full text-left">
                <thead class="bg-slate-800/50 text-slate-400 text-sm">
                    <tr>
                        <th class="px-6 py-4 font-medium">Product Name</th>
                        <th class="px-6 py-4 font-medium">Category</th>
                        <th class="px-6 py-4 font-medium">Price</th>
                        <th class="px-6 py-4 font-medium">Stock</th>
                        <th class="px-6 py-4 font-medium">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800 text-sm" id="admin-product-list">
                    <!-- Products dynamically rendered for admin -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminAuth();
            
            const tbody = document.getElementById('admin-product-list');
            if(window.db && tbody) {
                tbody.innerHTML = window.db.products.map(p => `
                    <tr class="hover:bg-slate-800/20 transition">
                        <td class="px-6 py-4 flex items-center gap-4">
                            <img src="${p.image}" class="w-10 h-10 rounded object-cover bg-slate-800">
                            <div class="font-medium text-white">${p.name}</div>
                        </td>
                        <td class="px-6 py-4 text-slate-400">${p.category}</td>
                        <td class="px-6 py-4 font-medium">${window.db.formatPrice(p.price)}</td>
                        <td class="px-6 py-4">
                            ${p.inStock 
                                ? '<span class="text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded text-xs">In Stock</span>' 
                                : '<span class="text-red-400 bg-red-500/10 px-2 py-1 rounded text-xs">Out of Stock</span>'}
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex gap-2">
                                <button class="text-sky-400 hover:text-sky-300">Edit</button>
                                <button class="text-red-400 hover:text-red-300">Delete</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }
        });
    </script>
</body>
</html>
