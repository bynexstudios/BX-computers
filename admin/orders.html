<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders | Admin | Bynex PC Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="antialiased bg-slate-950 text-white min-h-screen flex">
    
    <!-- Sidebar Snippet -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-screen sticky top-0">
        <div class="h-20 flex items-center px-6 border-b border-slate-800">
            <a href="../index.html" class="font-heading font-black text-2xl tracking-tight text-white">BYNEX<span class="text-sky-400">PC</span></a>
        </div>
        <nav class="flex-grow py-6 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Dashboard</a>
            <a href="products.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Products</a>
            <a href="orders.html" class="flex items-center gap-3 px-4 py-3 bg-sky-500/10 text-sky-400 rounded-xl font-medium transition">Orders</a>
            <a href="users.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Customers</a>
            <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition">Settings</a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="handleLogout()" class="flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-xl font-medium transition w-full">Sign Out</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-heading font-black">Manage Orders</h1>
        </header>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/30">
                <input type="text" placeholder="Search orders..." class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm text-white focus:border-sky-500 focus:outline-none w-64">
            </div>
            <table class="w-full text-left">
                <thead class="bg-slate-800/50 text-slate-400 text-sm">
                    <tr>
                        <th class="px-6 py-4 font-medium">Order ID</th>
                        <th class="px-6 py-4 font-medium">Customer</th>
                        <th class="px-6 py-4 font-medium">Date</th>
                        <th class="px-6 py-4 font-medium">Amount</th>
                        <th class="px-6 py-4 font-medium">Status</th>
                        <th class="px-6 py-4 font-medium">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800 text-sm">
                    <tr class="hover:bg-slate-800/20 transition">
                        <td class="px-6 py-4 font-medium text-white">#ORD-001</td>
                        <td class="px-6 py-4">Nuwan Perera</td>
                        <td class="px-6 py-4 text-slate-400">Oct 24, 2026</td>
                        <td class="px-6 py-4">Rs. 235,000</td>
                        <td class="px-6 py-4"><span class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs font-bold border border-emerald-500/30">Delivered</span></td>
                        <td class="px-6 py-4"><button class="text-sky-400 hover:text-sky-300">View</button></td>
                    </tr>
                    <!-- More mock orders -->
                    <tr class="hover:bg-slate-800/20 transition">
                        <td class="px-6 py-4 font-medium text-white">#ORD-002</td>
                        <td class="px-6 py-4">Kasun Silva</td>
                        <td class="px-6 py-4 text-slate-400">Oct 24, 2026</td>
                        <td class="px-6 py-4">Rs. 48,000</td>
                        <td class="px-6 py-4"><span class="bg-amber-500/20 text-amber-400 px-3 py-1 rounded-full text-xs font-bold border border-amber-500/30">Processing</span></td>
                        <td class="px-6 py-4"><button class="text-sky-400 hover:text-sky-300">View</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="../assets/js/auth.js"></script>
    <script>document.addEventListener('DOMContentLoaded', checkAdminAuth);</script>
</body>
</html>
