<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Bynex PC Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="antialiased relative min-h-screen flex items-center justify-center">
    <div class="cyber-grid fixed"></div>
    <div class="glow-blob top-0 left-0"></div>

    <div class="glass w-full max-w-md p-8 sm:p-10 rounded-[2rem] relative z-10 mx-4 border border-slate-700/50 shadow-2xl">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-block font-heading font-black text-3xl tracking-tight text-white mb-2">BYNEX<span class="text-sky-400">PC</span></a>
            <p class="text-slate-400">Welcome back to your ultimate PC store</p>
        </div>

        <div id="error-msg" class="hidden mb-6 p-3 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-lg text-center"></div>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition placeholder-slate-600" placeholder="Enter your email">
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
                    <a href="#" class="text-xs text-sky-400 hover:text-sky-300">Forgot Password?</a>
                </div>
                <input type="password" id="password" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition placeholder-slate-600" placeholder="Enter your password">
            </div>

            <button type="submit" class="w-full btn-primary py-3.5 rounded-xl font-bold text-white shadow-lg shadow-sky-500/20 mt-4">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-slate-400 mt-8">
            Don't have an account? <a href="register.html" class="text-sky-400 hover:text-sky-300 font-medium">Create one now</a>
        </p>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
