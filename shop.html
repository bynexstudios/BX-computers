<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Bynex PC Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        dark: '#0f172a',
                        darker: '#020617',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased relative min-h-screen flex flex-col">
    <!-- Background Effects -->
    <div class="cyber-grid fixed"></div>
    <div class="glow-blob top-0 right-0"></div>

    <!-- Navigation (Simplified for brevity, assuming same as index) -->
    <nav class="glass-nav fixed w-full z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-sky-400 to-violet-600 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-sky-500/30">B</div>
                    <a href="index.html" class="font-heading font-black text-2xl tracking-tight text-white">BYNEX<span class="text-sky-400">PC</span></a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="index.html" class="text-slate-300 hover:text-white hover:bg-slate-800 font-medium px-3 py-2 rounded-md transition">Home</a>
                        <a href="shop.html" class="text-sky-400 font-medium px-3 py-2 rounded-md transition hover:bg-slate-800">Shop</a>
                        <a href="about.html" class="text-slate-300 hover:text-white hover:bg-slate-800 font-medium px-3 py-2 rounded-md transition">About</a>
                        <a href="contact.html" class="text-slate-300 hover:text-white hover:bg-slate-800 font-medium px-3 py-2 rounded-md transition">Contact</a>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-6">
                    <a href="cart.html" class="relative text-slate-300 hover:text-sky-400 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                        <span class="cart-count absolute -top-2 -right-2 bg-sky-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-slate-900 hidden">0</span>
                    </a>
                    <div id="auth-links" class="flex gap-3">
                        <a href="login.html" class="text-slate-300 hover:text-white font-medium text-sm transition">Log in</a>
                        <a href="register.html" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition">Sign up</a>
                    </div>
                    <div id="user-menu" class="hidden relative group cursor-pointer">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-sky-500/20 text-sky-400 flex items-center justify-center font-bold border border-sky-500/30">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                            </div>
                            <span id="user-name" class="text-sm font-medium text-slate-300">User</span>
                        </div>
                        <div class="absolute right-0 mt-2 w-48 glass rounded-xl shadow-xl py-2 hidden group-hover:block transition-all border border-slate-700/50">
                            <a id="admin-link" href="admin/dashboard.html" class="block px-4 py-2 text-sm text-sky-400 hover:bg-slate-800 hidden">Admin Dashboard</a>
                            <a href="#" class="block px-4 py-2 text-sm text-slate-300 hover:bg-slate-800">My Orders</a>
                            <a href="#" onclick="handleLogout()" class="block px-4 py-2 text-sm text-red-400 hover:bg-slate-800 border-t border-slate-700/50 mt-1">Sign out</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="pt-32 pb-12 text-center relative z-10 border-b border-slate-800 bg-slate-900/50">
        <h1 class="text-4xl md:text-5xl font-heading font-black mb-4">Shop <span class="text-sky-400">Components</span></h1>
        <p class="text-slate-400 max-w-2xl mx-auto px-4">Browse our massive selection of premium PC parts to build your ultimate machine.</p>
    </div>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full flex flex-col md:flex-row gap-8 z-10 relative">
        
        <!-- Sidebar Filters -->
        <aside class="w-full md:w-64 flex-shrink-0">
            <div class="glass p-6 rounded-2xl sticky top-24">
                <h3 class="font-bold text-lg mb-4 text-white flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-sky-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
                    Filters
                </h3>
                
                <div class="mb-6">
                    <h4 class="font-semibold text-slate-300 mb-3 text-sm uppercase tracking-wider">Categories</h4>
                    <div class="space-y-2">
                        <label class="flex items-center gap-3 text-slate-400 hover:text-white cursor-pointer">
                            <input type="checkbox" class="rounded border-slate-700 bg-slate-800 text-sky-500 focus:ring-sky-500/50">
                            Processor
                        </label>
                        <label class="flex items-center gap-3 text-slate-400 hover:text-white cursor-pointer">
                            <input type="checkbox" class="rounded border-slate-700 bg-slate-800 text-sky-500 focus:ring-sky-500/50">
                            Motherboard
                        </label>
                        <label class="flex items-center gap-3 text-slate-400 hover:text-white cursor-pointer">
                            <input type="checkbox" class="rounded border-slate-700 bg-slate-800 text-sky-500 focus:ring-sky-500/50">
                            Graphics Card
                        </label>
                        <label class="flex items-center gap-3 text-slate-400 hover:text-white cursor-pointer">
                            <input type="checkbox" class="rounded border-slate-700 bg-slate-800 text-sky-500 focus:ring-sky-500/50">
                            RAM
                        </label>
                        <label class="flex items-center gap-3 text-slate-400 hover:text-white cursor-pointer">
                            <input type="checkbox" class="rounded border-slate-700 bg-slate-800 text-sky-500 focus:ring-sky-500/50">
                            Storage
                        </label>
                    </div>
                </div>

                <div>
                    <h4 class="font-semibold text-slate-300 mb-3 text-sm uppercase tracking-wider">Price Range</h4>
                    <div class="flex items-center gap-2">
                        <input type="number" placeholder="Min" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-sky-500">
                        <span class="text-slate-500">-</span>
                        <input type="number" placeholder="Max" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-sky-500">
                    </div>
                    <button class="w-full mt-4 bg-slate-800 hover:bg-slate-700 text-white text-sm font-medium py-2 rounded-lg transition">Apply Filter</button>
                </div>
            </div>
        </aside>

        <!-- Product Grid -->
        <div class="flex-grow">
            <!-- Sorting & Search -->
            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                <div class="relative w-full sm:w-64">
                    <input type="text" placeholder="Search products..." class="w-full bg-slate-800 border border-slate-700 rounded-xl pl-10 pr-4 py-2 text-sm text-white focus:outline-none focus:border-sky-500 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 absolute left-3 top-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
                
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <span class="text-sm text-slate-400 whitespace-nowrap">Sort by:</span>
                    <select class="bg-slate-800 border border-slate-700 text-white text-sm rounded-xl px-4 py-2 focus:outline-none focus:border-sky-500 appearance-none pr-8 relative">
                        <option>Featured</option>
                        <option>Price: Low to High</option>
                        <option>Price: High to Low</option>
                        <option>Newest Arrivals</option>
                    </select>
                </div>
            </div>

            <!-- Products -->
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Products dynamically inserted via app.js -->
            </div>
        </div>
    </main>

    <!-- Footer snippet -->
    <footer class="border-t border-slate-800 bg-slate-950/80 mt-12 py-8 text-center text-sm text-slate-500 relative z-10">
        <div class="max-w-7xl mx-auto px-4">&copy; 2026 Bynex PC. All rights reserved.</div>
    </footer>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
