<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Bynex PC Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="antialiased relative min-h-screen flex items-center justify-center py-12">
    <div class="cyber-grid fixed"></div>
    <div class="glow-blob bottom-0 right-0"></div>

    <div class="glass w-full max-w-md p-8 sm:p-10 rounded-[2rem] relative z-10 mx-4 border border-slate-700/50 shadow-2xl">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block font-heading font-black text-3xl tracking-tight text-white mb-2">BYNEX<span class="text-sky-400">PC</span></a>
            <p class="text-slate-400">Join the ultimate PC hardware community</p>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='login.html';" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Full Name</label>
                <input type="text" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-sky-500 transition">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Email Address</label>
                <input type="email" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-sky-500 transition">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-sky-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Confirm Password</label>
                <input type="password" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-sky-500 transition">
            </div>

            <button type="submit" class="w-full btn-primary py-3.5 rounded-xl font-bold text-white mt-4">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-slate-400 mt-8">
            Already have an account? <a href="login.html" class="text-sky-400 hover:text-sky-300 font-medium">Sign in</a>
        </p>
    </div>
</body>
</html>
