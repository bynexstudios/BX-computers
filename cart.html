<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Bynex PC Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9', dark: '#0f172a', darker: '#020617' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="antialiased relative min-h-screen flex flex-col">
    <div class="cyber-grid fixed"></div>

    <nav class="glass-nav fixed w-full z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <a href="index.html" class="font-heading font-black text-2xl tracking-tight text-white">BYNEX<span class="text-sky-400">PC</span></a>
                </div>
                <div class="hidden md:flex items-center gap-6">
                    <a href="shop.html" class="text-slate-300 hover:text-white font-medium text-sm transition">Continue Shopping</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-16 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full z-10 relative">
        <h1 class="text-4xl font-heading font-black mb-8 border-b border-slate-800 pb-4">Your Cart</h1>
        
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-2/3" id="cart-items">
                <!-- Cart items populated by app.js -->
            </div>
            
            <div class="lg:w-1/3" id="cart-summary">
                <!-- Summary populated by app.js -->
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-800 bg-slate-950/80 py-8 text-center text-sm text-slate-500 relative z-10">
        <div class="max-w-7xl mx-auto px-4">&copy; 2026 Bynex PC. All rights reserved.</div>
    </footer>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
